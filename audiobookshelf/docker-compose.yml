services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - TZ=Europe/Prague
    ports:
      - 13378:80
    volumes:
      - /mnt/data/audiobooks:/audiobooks
      - ~/mediastack/audiobookshelf/config:/config
      - ~/mediastack/audiobookshelf/metadata:/metadata
    restart: unless-stopped
